name: Daily News Agent

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
    inputs:
      provider:
        description: "LLM Provider (ollama/hf)"
        required: false
        default: "hf"

permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run agent
        run: python -m news_agent.main
        env:
          MODEL_PROVIDER: ${{ github.event.inputs.provider || 'hf' }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          PHONE_NO: ${{ secrets.PHONE_NO }}

      - name: Commit and push memory files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/memory/ data/processed/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changes to memory files"
          else
            git commit -m "chore: update agent memory [skip ci]"
            git push origin HEAD:main || echo "Push failed"
          fi
